name: Android APK Uretim Fabrikasi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Java 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Calisma Izinlerini Ver
      run: chmod +x gradlew

    - name: APK Derleme Marsi
      run: ./gradlew assembleDebug

    - name: Taze APK'yi Yukari Yukle
      uses: actions/upload-artifact@v4
      with:
        name: Akilli-Analiz-Okuyucu-APK
        path: app/build/outputs/apk/debug/app-debug.apk

